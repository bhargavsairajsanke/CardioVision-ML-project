<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioVision Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-10 flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-3xl font-extrabold text-teal-600 flex items-center justify-center md:justify-start gap-3">
                    <span class="text-4xl">🩺</span> CardioVision
                </h1>
                <p class="text-slate-500 mt-2 font-medium">Model Analytics & Performance Dashboard</p>
            </div>
            <div class="flex gap-3">
                <a href="/" class="flex items-center gap-2 px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold transition-colors duration-200">
                    🏠 Home
                </a>
                <a href="/" class="flex items-center gap-2 px-5 py-2.5 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-semibold shadow-sm transition-all duration-200">
                    ✨ New Prediction
                </a>
            </div>
        </div>

        <div class="mb-10">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b border-slate-200 pb-2">📊 Model Evaluation</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-semibold text-slate-600 mb-4 text-center">ROC Curve</h3>
                    <img src="{{ url_for('static', filename='images/roc_curve.png') }}" class="w-full h-auto rounded-lg">
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-semibold text-slate-600 mb-4 text-center">Confusion Matrix</h3>
                    <img src="{{ url_for('static', filename='images/confusion_matrix.png') }}" class="w-full h-auto rounded-lg">
                </div>
            </div>
        </div>

        <div class="mb-10">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b border-slate-200 pb-2">📈 Model Comparison</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-md font-semibold text-slate-600 mb-3 text-center">Accuracy</h3>
                    <img src="{{ url_for('static', filename='images/accuracy_comparison.png') }}" class="w-full h-auto rounded-lg">
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-md font-semibold text-slate-600 mb-3 text-center">Precision</h3>
                    <img src="{{ url_for('static', filename='images/precision_comparison.png') }}" class="w-full h-auto rounded-lg">
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-md font-semibold text-slate-600 mb-3 text-center">Recall</h3>
                    <img src="{{ url_for('static', filename='images/recall_comparison.png') }}" class="w-full h-auto rounded-lg">
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-md font-semibold text-slate-600 mb-3 text-center">F1 Score</h3>
                    <img src="{{ url_for('static', filename='images/f1_comparison.png') }}" class="w-full h-auto rounded-lg">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-12">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b border-slate-200 pb-2">🌟 Feature Importance</h2>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <img src="{{ url_for('static', filename='images/feature_importance.png') }}" class="w-full h-auto rounded-lg">
                </div>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b border-slate-200 pb-2">🧠 Clustering</h2>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
                    <h3 class="text-lg font-semibold text-slate-600 mb-4 text-center">KMeans Clusters</h3>
                    <img src="{{ url_for('static', filename='images/kmeans_clusters.png') }}" class="w-full h-auto rounded-lg">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
